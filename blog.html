<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blog — Mohammad Javad Hoseini</title>
<style>
  :root { --teal:#00a388; --dark:#333; --body:#4d4d4d; --role:#5d5d5d; --gray:#838383; --rule:#444; --border:#e2e2e2; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:"Source Sans 3","Source Sans Pro","Lato","Segoe UI",system-ui,sans-serif; color:var(--body); line-height:1.55; background:#fff; }
  a { color:var(--teal); text-decoration:none; }
  a:hover { text-decoration:underline; }
  .wrap { max-width:820px; margin:0 auto; padding:0 1.4rem; }
  nav { position:sticky; top:0; z-index:10; background:rgba(255,255,255,.92); backdrop-filter:blur(6px); border-bottom:1px solid var(--border); }
  nav .wrap { display:flex; align-items:center; justify-content:space-between; height:56px; }
  nav .brand { font-weight:700; color:var(--dark); font-size:1.1rem; letter-spacing:.02em; }
  nav .brand a { color:var(--dark); }
  nav .links a { color:var(--role); font-weight:600; margin-left:1.4rem; }
  nav .links a:hover { color:var(--teal); text-decoration:none; }
  h1.page { margin:2.5rem 0 .3rem; font-size:2.2rem; color:var(--dark); }
  h1.page .hl { color:var(--teal); }
  .sub { color:var(--gray); margin-bottom:2rem; }
  ul.posts { list-style:none; padding:0; margin:0; }
  ul.posts li { padding:1rem 0; border-top:1px solid var(--border); }
  ul.posts li:last-child { border-bottom:1px solid var(--border); }
  ul.posts li a { display:flex; gap:1rem; align-items:flex-start; }
  ul.posts .thumb { width:96px; height:96px; object-fit:cover; border-radius:6px; flex-shrink:0; }
  @media (max-width:480px) { ul.posts .thumb { width:64px; height:64px; } }
  ul.posts .date { display:block; font-size:.85rem; color:var(--gray); font-family:ui-monospace,Menlo,Consolas,monospace; }
  ul.posts .title { font-size:1.2rem; font-weight:700; color:var(--dark); }
  ul.posts a:hover .title { color:var(--teal); }
  ul.posts .excerpt { margin:.2rem 0 0; color:var(--body); }
  footer { color:var(--gray); font-size:.9rem; padding:2rem 0 3rem; }
</style>
</head>
<body>
<nav>
  <div class="wrap">
    <span class="brand"><a href="index.html">MJH</a></span>
    <span class="links">
      <a href="resume_short.html">Resume</a>
      <a href="blog.html">Blog</a>
      <a href="index.html#about">About</a>
    </span>
  </div>
</nav>

<div class="wrap">
  <h1 class="page"><span class="hl">/</span> Blog</h1>
  <p class="sub">Notes on infra, reliability, and whatever I'm breaking this week.</p>

  <!-- ponytail: newest first. Copy a <li>, point href at blog/<slug>.html, thumb at images/<slug>.jpg, done. -->
  <ul class="posts">
    <li>
      <a href="blog/vim-cheatsheet.html">
        <img class="thumb" src="images/vim-cheatsheet.svg" alt="" loading="lazy">
        <span>
          <span class="date">2026-07-16</span>
          <span class="title">VIM</span>
          <p class="excerpt">Cheatsheet #1: the Vim commands I actually reach for — windows, buffers, sessions, vimdiff.</p>
        </span>
      </a>
    </li>
  </ul>

  <footer>&copy; Mohammad Javad Hoseini</footer>
</div>
</body>
</html>
